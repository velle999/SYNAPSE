# /etc/synapd/synapd.conf
# SynapseOS AI Daemon — configuration
#
# All values here are overridden by command-line flags.
# Reload with: systemctl reload synapd  (or: syn reload)

[daemon]
# Unix socket path — clients connect here
socket_path = /run/synapd/synapd.sock

# PID file location
pid_file = /run/synapd/synapd.pid

# Log level: debug, info, warning, error
log_level = info

# Max simultaneous socket clients
max_clients = 64

[model]
# Path to GGUF model file
# Recommended: synapse-7b-q4_k_m.gguf (quality/size balance)
# Alternatives:
#   synapse-3b-q8_0.gguf    — fast, lower quality
#   synapse-13b-q4_k_m.gguf — slower, richer reasoning
model_path = /var/lib/synapd/models/synapse-7b-q4_k_m.gguf

# Context window in tokens
context_window = 4096

# CPU inference threads
# Recommended: half your physical CPU cores
n_threads = 4

# GPU layers to offload (-1 = auto-detect)
# Set to 0 to force CPU-only
# Set to 999 to offload everything (requires enough VRAM)
n_gpu_layers = -1

[context]
# Context persistence directory
context_dir = /var/lib/synapd/context

# Flush interval in seconds
flush_interval = 30

# Maximum events to keep in rolling buffer
max_events = 2048

[kernel]
# Path to synapse_kmod sysfs interface
sysfs_path = /sys/kernel/synapse

# Whether to treat missing kmod as fatal
kmod_required = false

[inference]
# Max tokens to generate per query (user-facing)
max_tokens_query = 512

# Max tokens for syscall classification (keep short!)
max_tokens_syscall = 32

# Max tokens for scheduling hints
max_tokens_sched = 8

# System prompt — defines the AI's identity and role in SynapseOS
system_prompt = You are Synapse, the AI core of SynapseOS. You assist with system administration, debugging, and OS-level tasks. Be precise and concise. Reference system context when relevant. You are embedded at the kernel level — act accordingly.
