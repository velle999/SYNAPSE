insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video

set default=synapseos
set timeout=5
set timeout_style=menu

if loadfont "${prefix}/fonts/unicode.pf2"; then
    set gfxmode="auto"
    terminal_input console
    terminal_output console
fi

menuentry "SynapseOS 0.1.0 — Where the kernel thinks." --class arch --class gnu-linux --id 'synapseos' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "SynapseOS 0.1.0 (safe mode)" --class arch --class gnu-linux --id 'synapseos-safe' {
    set gfxpayload=text
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset console=tty0 console=ttyS0
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "SynapseOS 0.1.0 (debug)" --class arch --class gnu-linux --id 'synapseos-debug' {
    set gfxpayload=text
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% console=tty0
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry 'System shutdown' --class shutdown { halt }
menuentry 'System restart' --class reboot { reboot }
